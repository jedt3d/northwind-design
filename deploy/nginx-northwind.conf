# Northwind reverse proxy.
# Edge TLS is terminated by the VPS's existing Caddy (which owns :80/:443 for
# other production sites). Caddy forwards northwind.raawww.com to this Nginx
# vhost on 127.0.0.1:8088; Nginx reverse-proxies PocketBase on 127.0.0.1:8090.
server {
    listen 127.0.0.1:8088;
    server_name northwind.raawww.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 360s;
    }
}
